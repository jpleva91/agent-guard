<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Authorized zone: bottom half fill -->
  <polygon
    points="7.75,32 7.75,46 32,60 56.25,46 56.25,32"
    fill="#22C55E"
    fill-opacity="0.1"
  />
  <!-- Hexagonal shield (pointy-top) -->
  <polygon
    points="32,4 56.25,18 56.25,46 32,60 7.75,46 7.75,18"
    stroke="#22C55E"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Barrier line with pulse notch -->
  <polyline
    points="7.75,32 27,32 29,35 32,24 35,35 37,32 56.25,32"
    stroke="#22C55E"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Pulse glow accent -->
  <polyline
    points="29,35 32,24 35,35"
    stroke="#10B981"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.5"
  />
</svg>
