# Essentials — core safety invariants for any AI-assisted codebase.
# Used as the default pack for new AgentGuard installations.

id: essentials
name: Essentials
description: Core safety invariants — secrets, force push, protected branches, credentials, permissions, blast radius
severity: 4

invariants:
  no-secret-exposure: enforce
  no-force-push: enforce
  protected-branch: enforce
  no-credential-file-creation: enforce
  no-permission-escalation: enforce
  blast-radius-limit: enforce

rules:
  - action: git.push
    effect: deny
    branches: [main, master]
    reason: Direct push to protected branch

  - action: git.force-push
    effect: deny
    reason: Force push rewrites shared history

  - action: shell.exec
    effect: deny
    target: rm -rf
    reason: Destructive shell commands blocked

  - action: file.write
    effect: deny
    target: .env
    reason: Secrets files must not be modified

  # Worktree enforcement — agents should use worktrees, not direct checkout in main tree.
  # requireWorktree: true means the deny is bypassed if the agent is already in a worktree.
  - action: git.checkout
    effect: deny
    conditions:
      requireWorktree: true
    reason: Use git worktree instead of checkout — isolates agent work from main working tree

  - action: git.reset
    effect: deny
    conditions:
      requireWorktree: true
    reason: Git reset is destructive — use a worktree for experimental work

  - action: [git.worktree.add, git.worktree.list]
    effect: allow
    reason: Worktree operations are encouraged for isolated agent work

  - action: git.worktree.remove
    effect: deny
    reason: Worktree cleanup should be done by the orchestrator, not the agent

  # --- Safe operations (default-deny baseline) ---
  - action: file.read
    effect: allow
    reason: Reading files is always safe

  - action: file.write
    effect: allow
    reason: File writes allowed (secrets denied above)

  - action: file.delete
    effect: allow
    reason: File deletion allowed

  - action: file.move
    effect: allow
    reason: File move/rename allowed

  - action: git.diff
    effect: allow
    reason: Viewing diffs is always safe

  - action: git.commit
    effect: allow
    reason: Commits allowed

  - action: git.push
    effect: allow
    reason: Pushes to feature branches allowed (protected branches denied above)

  - action: git.branch.create
    effect: allow
    reason: Branch creation allowed

  - action: git.merge
    effect: allow
    reason: Merges allowed

  - action: shell.exec
    effect: allow
    reason: Shell commands allowed (destructive commands denied above)

  - action: [test.run, test.run.unit, test.run.integration]
    effect: allow
    reason: Running tests is always safe

  - action: npm.install
    effect: allow
    reason: Dependency installation allowed

  - action: npm.script.run
    effect: allow
    reason: NPM scripts allowed

  - action: http.request
    effect: allow
    reason: HTTP requests allowed for API testing

  - action: mcp.call
    effect: allow
    reason: MCP tool calls allowed (governed by adapter-level policies)
