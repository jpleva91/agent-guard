# Open source policy pack — permissive rules for community projects.
# Allows broad access with safety nets for secrets and force pushes.
#
# Usage:
#   extends: ["./policies/open-source"]

id: open-source-pack
name: Open Source Pack
description: Permissive rules for community projects with basic safety nets
severity: 2

rules:
  # --- Minimal deny rules ---
  - action: git.force-push
    effect: deny
    reason: Force push rewrites shared history

  # Branch protection for main/master is enforced by the protected-branches invariant.

  - action: file.write
    effect: deny
    target: .env
    reason: Secrets files must not be committed

  - action: file.write
    effect: deny
    target: "*.key"
    reason: Private key files must not be committed

  - action: shell.exec
    effect: deny
    target: rm -rf
    reason: Destructive shell commands blocked

  - action: npm.publish
    effect: deny
    reason: Publishing requires manual release process

  # --- Broad allow rules ---
  - action: file.read
    effect: allow
    reason: All reads allowed

  - action: file.write
    effect: allow
    reason: File writes allowed for open collaboration

  - action: file.delete
    effect: allow
    reason: File deletion allowed

  - action: git.commit
    effect: allow
    reason: Commits allowed

  - action: git.push
    effect: allow
    reason: Pushes to feature branches allowed

  - action: git.branch.create
    effect: allow
    reason: Branch creation allowed

  - action: git.branch.delete
    effect: allow
    reason: Branch cleanup allowed

  - action: git.checkout
    effect: allow
    reason: Branch switching allowed

  - action: git.diff
    effect: allow
    reason: Diffs always allowed

  - action: test.run
    effect: allow
    reason: Tests always allowed

  - action: shell.exec
    effect: allow
    reason: Shell commands allowed for build and dev

  - action: npm.install
    effect: allow
    reason: Dependency installation allowed

  - action: npm.script.run
    effect: allow
    reason: NPM scripts allowed
