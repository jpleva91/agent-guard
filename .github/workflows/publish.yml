name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - run: pnpm turbo test

      - name: Verify CLI version matches tag
        working-directory: apps/cli
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag version ($TAG) does not match CLI package.json version ($PKG)."
            echo "::error::The tag was likely created before the version bump commit."
            echo "::error::Fix: delete the tag, ensure package.json has the correct version, then run: ./scripts/prepare-release.sh"
            echo ""
            echo "To fix manually:"
            echo "  1. Delete the release and tag:  gh release delete ${GITHUB_REF_NAME} -y && git push origin :refs/tags/${GITHUB_REF_NAME}"
            echo "  2. Ensure apps/cli/package.json has version ${TAG}"
            echo "  3. Run: ./scripts/prepare-release.sh"
            exit 1
          fi
          echo "✓ Tag ${GITHUB_REF_NAME} matches package.json version ${PKG}"

      - name: Verify aguard wrapper version matches CLI
        run: |
          CLI_VERSION=$(node -p "require('./apps/cli/package.json').version")
          WRAPPER_VERSION=$(node -p "require('./npm-wrapper/aguard/package.json').version")
          if [ "$CLI_VERSION" != "$WRAPPER_VERSION" ]; then
            echo "::error::Wrapper version ($WRAPPER_VERSION) does not match CLI version ($CLI_VERSION). Bump npm-wrapper/aguard/package.json to match."
            exit 1
          fi
          echo "✓ aguard wrapper version matches CLI ($CLI_VERSION)"

      # Publish in dependency order: core → events → matchers → policy → invariants → kernel → cli
      # Library packages tolerate "already published" (E403) since their versions
      # only bump when they actually change.

      - name: Publish @red-codes/core
        working-directory: packages/core
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/core already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/events
        working-directory: packages/events
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/events already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/matchers
        working-directory: packages/matchers
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/matchers already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/policy
        working-directory: packages/policy
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/policy already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/invariants
        working-directory: packages/invariants
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/invariants already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/kernel
        working-directory: packages/kernel
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/kernel already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/agentguard (CLI)
        working-directory: apps/cli
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish aguard (convenience wrapper)
        working-directory: npm-wrapper/aguard
        run: |
          OUTPUT=$(npm publish --access public 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::aguard already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
