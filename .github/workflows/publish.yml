name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - run: pnpm turbo test

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build Go kernel binaries (shipped in npm package)
        working-directory: go
        run: |
          mkdir -p ../apps/cli/dist/go-bin
          GOOS=linux GOARCH=amd64 go build -o ../apps/cli/dist/go-bin/agentguard-go-linux-amd64 ./cmd/agentguard/
          GOOS=darwin GOARCH=arm64 go build -o ../apps/cli/dist/go-bin/agentguard-go-darwin-arm64 ./cmd/agentguard/
          GOOS=darwin GOARCH=amd64 go build -o ../apps/cli/dist/go-bin/agentguard-go-darwin-amd64 ./cmd/agentguard/
          GOOS=windows GOARCH=amd64 go build -o ../apps/cli/dist/go-bin/agentguard-go-windows-amd64.exe ./cmd/agentguard/
          ls -la ../apps/cli/dist/go-bin/

      - name: Verify CLI version matches tag
        working-directory: apps/cli
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag version ($TAG) does not match CLI package.json version ($PKG)"
            exit 1
          fi

      # Publish in dependency order: core → events → matchers → policy → invariants → kernel → cli
      # Library packages tolerate "already published" (E403) since their versions
      # only bump when they actually change.

      - name: Publish @red-codes/core
        working-directory: packages/core
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/core already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/events
        working-directory: packages/events
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/events already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/matchers
        working-directory: packages/matchers
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/matchers already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/policy
        working-directory: packages/policy
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/policy already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/invariants
        working-directory: packages/invariants
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/invariants already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/kernel
        working-directory: packages/kernel
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/kernel already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @red-codes/agentguard (CLI)
        working-directory: apps/cli
        run: |
          OUTPUT=$(pnpm publish --provenance --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::@red-codes/agentguard already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish aguard (convenience wrapper)
        working-directory: npm-wrapper/aguard
        run: |
          OUTPUT=$(npm publish --access public 2>&1) && echo "$OUTPUT" || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::notice::aguard already published at this version, skipping"
            else
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

