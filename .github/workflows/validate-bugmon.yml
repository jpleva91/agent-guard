name: Validate BugMon Submission

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  validate:
    if: contains(github.event.issue.labels.*.name, 'bugmon-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate submission
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set +e
          RESULT=$(node .github/scripts/validate-submission.cjs "$ISSUE_BODY")
          EXIT_CODE=$?
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Extract bugmon JSON for the preview step
          if [ "$EXIT_CODE" -eq 0 ]; then
            BUGMON=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.stringify(JSON.parse(d).bugmon))")
            echo "bugmon=$BUGMON" >> "$GITHUB_OUTPUT"
          fi

      - name: Run battle preview
        if: steps.validate.outputs.exit_code == '0'
        id: preview
        run: |
          PREVIEW=$(node .github/scripts/battle-preview.cjs '${{ steps.validate.outputs.bugmon }}')
          # Use a delimiter for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "preview<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$PREVIEW" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Comment validation success
        if: steps.validate.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const preview = `${{ steps.preview.outputs.preview }}`;
            const body = `### ✅ Validation Passed!\n\nYour BugMon submission looks good! A maintainer will review it for game balance.\n\n---\n\n${preview}\n\n---\n\n*This is an automated preview. The maintainer will add the \`approved\` label to add your BugMon to the game.*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Add validated label
        if: steps.validate.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['validated'],
            });

      - name: Comment validation failure
        if: steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const result = JSON.parse(`${{ steps.validate.outputs.result }}`);
            const errorList = result.errors.map(e => `- ${e}`).join('\n');
            const body = `### ❌ Validation Failed\n\nPlease fix the following issues and edit your submission:\n\n${errorList}\n\n---\n\n*Edit this issue to re-trigger validation.*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Add invalid label
        if: steps.validate.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['invalid'],
            });
