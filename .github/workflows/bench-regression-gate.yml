name: Benchmark Regression Gate

on:
  pull_request:
    paths:
      - 'packages/kernel/src/**'
      - 'packages/kernel/tests/benchmarks/**'
      - 'packages/policy/src/**'
      - 'packages/invariants/src/**'

jobs:
  bench:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@red-codes/kernel...

      - name: Run benchmarks
        working-directory: packages/kernel
        run: pnpm bench

      - name: Generate benchmark report
        run: node scripts/bench-report.mjs --json packages/kernel/bench-results.json --output benchmark-report.md

      - name: Check regression thresholds (p99 < 50ms)
        run: node scripts/bench-report.mjs --json packages/kernel/bench-results.json --threshold 50

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bench-results-${{ github.sha }}
          path: |
            packages/kernel/bench-results.json
            benchmark-report.md
          retention-days: 30
