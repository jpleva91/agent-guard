name: Deploy Telemetry Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/telemetry-server/**'
      - 'packages/core/**'
      - 'packages/telemetry/**'
      - 'packages/telemetry-client/**'
  workflow_dispatch:

concurrency:
  group: deploy-telemetry
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@red-codes/telemetry-server...
      - run: pnpm test --filter=@red-codes/telemetry-server

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=@red-codes/telemetry-server...
      - name: Install Vercel CLI
        run: pnpm add -g vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: apps/telemetry-server
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ steps.deploy.outputs.deploy_url }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
