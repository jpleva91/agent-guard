name: Approve BugMon Submission

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-pr:
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'bugmon-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Re-validate and extract BugMon data
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          RESULT=$(node .github/scripts/validate-submission.cjs "$ISSUE_BODY")
          BUGMON=$(echo "$RESULT" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.stringify(JSON.parse(d).bugmon))")
          echo "bugmon=$BUGMON" >> "$GITHUB_OUTPUT"

          # Extract name for branch naming
          NAME=$(echo "$BUGMON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d).name.toLowerCase())")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Generate BugMon entry
        run: |
          node .github/scripts/generate-bugmon.cjs '${{ steps.validate.outputs.bugmon }}'

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUGMON_NAME: ${{ steps.validate.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="bugmon/add-${BUGMON_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/monsters.json
          git commit -m "Add BugMon: ${BUGMON_NAME} (closes #${ISSUE_NUMBER})"
          git push origin "$BRANCH"

          gh pr create \
            --title "Add BugMon: ${BUGMON_NAME}" \
            --body "$(cat <<EOF
          ## New BugMon

          Adds **${BUGMON_NAME}** to the game roster.

          Submitted via #${ISSUE_NUMBER}.

          > ${ISSUE_TITLE}

          ---

          *Auto-generated from an approved BugMon submission.*
          EOF
          )" \
            --base main

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const name = `${{ steps.validate.outputs.name }}`;
            const body = `### 🎉 Approved!\n\nA pull request has been created to add **${name}** to the game. Once merged, your BugMon will appear in wild encounters!\n\nBranch: \`bugmon/add-${name}\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
