  - type: dropdown
    id: rarity
    attributes:
      label: Rarity
      description: How rare your BugMon is in the wild.
      options:
        - common
        - uncommon
        - legendary
    validations:
      required: true

  - type: input
    id: theme
    attributes:
      label: Theme
      description: A short theme for your BugMon (e.g. "runtime error", "concurrency bug", "infinite loading spinner").
      placeholder: e.g. nested async chaos
    validations:
      required: true

  - type: input
    id: evolution
    attributes:
      label: Evolution (optional)
      description: Name of the BugMon this evolves into. Leave blank if no evolution.
      placeholder: e.g. AsyncAwait
    validations:
      required: false

  - type: input
    id: color
    attributes:
      label: Color (optional)
      description: Hex color code for your BugMon (e.g. "#e74c3c"). Leave blank to use the default color for your type.
      placeholder: e.g. #e74c3c
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A vivid description of your BugMon's appearance. This is used as a reference for sprite art.
      placeholder: Describe what your BugMon looks like...
    validations:
      required: true
