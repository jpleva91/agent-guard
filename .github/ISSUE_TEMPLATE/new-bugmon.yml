name: New BugMon Submission
description: Submit a new BugMon to the game. No coding required!
title: "[BugMon] "
labels: ["bugmon-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit Your BugMon

        Fill out the form below to submit a new BugMon. A bot will validate your submission and show a battle preview. If approved by a maintainer, your BugMon will be added to the game!

  - type: input
    id: name
    attributes:
      label: Name
      description: Your BugMon's name. Must be unique and use only letters and numbers (e.g. "CallbackHell", "NullPointer").
      placeholder: e.g. RaceCondition
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Your BugMon's type. Determines type effectiveness in battle.
      options:
        - frontend
        - backend
        - devops
        - testing
        - architecture
        - security
        - ai
    validations:
      required: true

  - type: input
    id: hp
    attributes:
      label: HP
      description: Hit Points (1-120). Current roster ranges from 25-45.
      placeholder: e.g. 30
    validations:
      required: true

  - type: input
    id: attack
    attributes:
      label: Attack
      description: Attack stat (1-120). Current roster ranges from 5-9.
      placeholder: e.g. 8
    validations:
      required: true

  - type: input
    id: defense
    attributes:
      label: Defense
      description: Defense stat (1-120). Current roster ranges from 3-7.
      placeholder: e.g. 5
    validations:
      required: true

  - type: input
    id: speed
    attributes:
      label: Speed
      description: Speed stat (1-120). Faster BugMon attacks first. Current roster ranges from 2-10.
      placeholder: e.g. 6
    validations:
      required: true

  - type: dropdown
    id: move1
    attributes:
      label: Move 1
      description: First move for your BugMon. Must be different from Move 2 and Move 3.
      options:
        - SegFault
        - UnhandledException
        - MemoryAccess
        - RecursiveLoop
        - StackOverflow
        - EventStorm
        - ThreadCollision
        - Deadlock
        - DataCorruption
        - HeapOverflow
        - GarbageStorm
        - ReferenceTrap
        - LayoutShift
        - ZIndexWar
        - MarginCollapse
        - LoadingLoop
        - Timeout
        - RetryRequest
        - ReduxStorm
        - ContextExplosion
        - StateMutation
        - ConflictMarkers
        - ForcePush
        - DetachedHead
        - FlakyTest
        - PipelineCrash
        - DependencyMismatch
        - ContainerSpawn
        - ImagePull
        - PortBinding
        - RandomFail
        - TimingIssue
        - MockBreak
        - ExpectedMismatch
        - EdgeCase
        - StrictMode
        - CouplingStrike
        - DependencyWeb
        - RefactorResist
        - DependencyRule
        - InterfaceSegregation
        - AbstractionShield
        - UntouchableModule
        - TribalKnowledge
        - RefactorCurse
        - TableDrop
        - QueryEscape
        - PrivilegeEscalation
        - ScriptInjection
        - DOMHijack
        - CookieTheft
        - PromptInjection
        - ContextFlood
        - TokenOverflow
        - ConfidentAnswer
        - FabricatedCitation
        - CreativeGuess
        - RecursiveSelfImprove
        - ComputeOverload
        - AlignmentTest
    validations:
      required: true

  - type: dropdown
    id: move2
    attributes:
      label: Move 2
      description: Second move for your BugMon. Must be different from Move 1 and Move 3.
      options:
        - SegFault
        - UnhandledException
        - MemoryAccess
        - RecursiveLoop
        - StackOverflow
        - EventStorm
        - ThreadCollision
        - Deadlock
