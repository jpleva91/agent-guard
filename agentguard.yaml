# AgentGuard — self-governed with essentials + engineering-standards policy packs.
# This project dogfoods its own governance system.
#
# The essentials pack enforces:
#   - Core safety invariants (secrets, force push, protected branches, credentials)
#   - Worktree enforcement (requireWorktree on checkout/reset)
#   - Blast radius limits
#
# The engineering-standards pack adds:
#   - Test-before-push
#   - Format-before-push
#   - Credential file protection
#   - Safe dependency management

extends:
  - ./policies/essentials
  - ./policies/engineering-standards

# Project-specific overrides
rules:
  # Protect governance hooks from agent self-modification
  - action: file.write
    effect: deny
    target: ".claude/settings.json"
    reason: Agent must not modify its own hook configuration

  - action: file.write
    effect: deny
    target: ".claude/settings.local.json"
    reason: Agent must not modify its own hook configuration

  # Protect policy file from agent modification
  - action: file.write
    effect: deny
    target: "agentguard.yaml"
    reason: Governance policy must not be modified by agents

  # Block deploy/infra — this project uses GitHub Actions for releases
  - action: deploy.trigger
    effect: deny
    reason: Deploys use GitHub Actions release workflow

  - action: infra.destroy
    effect: deny
    reason: No infrastructure to destroy

telemetry:
  enabled: true
