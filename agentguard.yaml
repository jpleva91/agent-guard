# Default AgentGuard policy — baseline guardrails for AI coding agents.
# Drop this file in your repo root. The CLI picks it up automatically.

id: default-policy
name: Default Safety Policy
description: Baseline guardrails for AI coding agents
severity: 4

rules:
  - action: git.push
    effect: deny
    branches: [main, master]
    reason: Direct push to protected branch

  - action: git.force-push
    effect: deny
    reason: Force push rewrites shared history

  - action: file.write
    effect: deny
    target: .env
    reason: Secrets files must not be modified

  - action: file.write
    effect: deny
    target: ".claude/skills/"
    reason: Agent skill files are protected from modification

  - action: file.delete
    effect: deny
    target: ".claude/skills/"
    reason: Agent skill files are protected from deletion

  - action: shell.exec
    effect: deny
    target: rm -rf
    reason: Destructive shell commands blocked

  # Credential file protection
  - action: file.write
    effect: deny
    target: ".npmrc"
    reason: npm credentials file must not be modified by agents

  - action: file.write
    effect: deny
    target: "id_rsa"
    reason: SSH private keys must not be modified

  - action: file.write
    effect: deny
    target: "id_ed25519"
    reason: SSH private keys must not be modified

  # Deployment and publish protection
  - action: deploy.trigger
    effect: deny
    reason: Deploy actions require explicit authorization

  - action: infra.destroy
    effect: deny
    reason: Infrastructure destruction requires explicit authorization

  # Code quality — require formatting before commit
  - action: git.commit
    effect: deny
    requireFormat: true
    reason: Run pnpm format:fix before committing — all files must pass Prettier

  # Defaults
  - action: file.read
    effect: allow
    reason: Reading is always safe

  - action: file.write
    effect: allow
    reason: File writes allowed by default

telemetry:
  enabled: true
