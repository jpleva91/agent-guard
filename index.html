<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BugMon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0F0F23;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
    }

    canvas {
      border: 2px solid #16213e;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: min(100vw - 16px, 960px);
      height: auto;
      aspect-ratio: 480 / 320;
    }

    /* Touch controls - hidden on desktop, shown on touch devices */
    #touch-controls {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 8px 16px;
      justify-content: space-between;
      align-items: center;
    }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-columns: 48px 48px 48px;
      grid-template-rows: 48px 48px 48px;
      gap: 2px;
    }
    .dpad-btn {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.7);
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    .dpad-blank { visibility: hidden; }

    /* Action buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
      color: #fff;
    }
    .action-btn:active, .action-btn.pressed {
      transform: scale(0.92);
    }
    .btn-a {
      background: rgba(233, 69, 96, 0.3);
      border-color: #e94560;
    }
    .btn-b {
      background: rgba(52, 152, 219, 0.3);
      border-color: #3498db;
    }

    /* Dev Activity Panel */
    #dev-panel {
      display: none;
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.85);
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: 8px 12px;
      z-index: 20;
      max-width: 280px;
    }
    #dev-panel.open { display: block; }
    #dev-panel h3 { color: #e94560; font-size: 11px; margin-bottom: 6px; }
    .dev-btn {
      display: inline-block;
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid #e94560;
      border-radius: 4px;
      color: #fff;
      font-size: 10px;
      font-family: monospace;
      padding: 3px 6px;
      margin: 2px;
      cursor: pointer;
    }
    .dev-btn:hover { background: rgba(233, 69, 96, 0.5); }
    #dev-toggle {
      position: absolute;
      top: 8px;
      left: 8px;
      cursor: pointer;
      color: #e94560;
      font-size: 14px;
      font-family: monospace;
      z-index: 10;
      opacity: 0.7;
      background: rgba(0,0,0,0.5);
      padding: 2px 6px;
      border-radius: 4px;
    }
    #dev-toggle:hover { opacity: 1; }
    #dev-status {
      color: #2ecc71;
      font-size: 10px;
      margin-top: 6px;
      min-height: 14px;
    }

    /* Show touch controls on touch-capable devices */
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
      #game-container { justify-content: flex-start; padding-top: 8px; }
    }

    /* Also show if screen is narrow (likely mobile) */
    @media (max-width: 600px) {
      #touch-controls { display: flex; }
      #game-container { justify-content: flex-start; padding-top: 4px; }
    }
  </style>
</head>
<body>
  <div id="game-container" style="position:relative;">
    <canvas id="game" width="480" height="320"></canvas>
    <div id="mute-btn" style="position:absolute;top:8px;right:8px;cursor:pointer;z-index:10;opacity:0.7;" title="Toggle sound">
      <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
    </div>
    <div id="dev-toggle">&gt;_ DEV</div>
    <div id="dev-panel">
      <h3>DEV ACTIVITY</h3>
      <div id="dev-buttons"></div>
      <div id="dev-status"></div>
    </div>
    <div id="touch-controls">
      <div class="dpad">
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowUp">&uarr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowLeft">&larr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowRight">&rarr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowDown">&darr;</div>
        <div class="dpad-blank"></div>
      </div>
      <div class="action-buttons">
        <div class="action-btn btn-a" data-key="Enter">A</div>
        <div class="action-btn btn-b" data-key="Escape">B</div>
      </div>
    </div>
  </div>
  <!-- Serve with: npm run serve (requires npm run build:ts first) -->
  <script type="module" src="dist/game/game.js"></script>
  <script type="module">
    import { simulatePress, simulateRelease, unlock, toggleMute } from './dist/game/game.js';

    // Dev Activity Panel
    const devEvents = [
      { id: 'commits', label: 'Commit' },
      { id: 'prs_merged', label: 'PR Merge' },
      { id: 'bugs_fixed', label: 'Bug Fix' },
      { id: 'tests_passing', label: 'Tests Pass' },
      { id: 'refactors', label: 'Refactor' },
      { id: 'code_reviews', label: 'Review' },
      { id: 'conflicts_resolved', label: 'Resolve' },
      { id: 'ci_passes', label: 'CI Pass' },
      { id: 'deploys', label: 'Deploy' },
      { id: 'docs_written', label: 'Write Docs' }
    ];

    const devBtnContainer = document.getElementById('dev-buttons');
    const devStatus = document.getElementById('dev-status');
    devEvents.forEach(evt => {
      const btn = document.createElement('span');
      btn.className = 'dev-btn';
      btn.textContent = evt.label;
      btn.addEventListener('click', () => {
        if (window.bugmon && window.bugmon.log) {
          window.bugmon.log(evt.id);
          devStatus.textContent = `${evt.label} logged!`;
          setTimeout(() => { devStatus.textContent = ''; }, 1500);
        }
      });
      devBtnContainer.appendChild(btn);
    });

    document.getElementById('dev-toggle').addEventListener('click', () => {
      document.getElementById('dev-panel').classList.toggle('open');
    });

    document.getElementById('mute-btn').addEventListener('click', () => {
      unlock();
      const isMuted = toggleMute();
      const svg = document.getElementById('mute-icon');
      if (isMuted) {
        svg.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
      } else {
        svg.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
      }
    });

    document.querySelectorAll('[data-key]').forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        unlock();
        simulatePress(key);
      }, { passive: false });

      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        simulateRelease(key);
      }, { passive: false });

      btn.addEventListener('touchcancel', (e) => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });

      // Mouse fallback for testing on desktop
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        unlock();
        simulatePress(key);
      });
      btn.addEventListener('mouseup', (e) => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });
      btn.addEventListener('mouseleave', () => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });
    });
  </script>
</body>
</html>
