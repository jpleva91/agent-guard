<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BugMon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
    }

    canvas {
      border: 2px solid #16213e;
      image-rendering: pixelated;
      max-width: 100%;
      height: auto;
    }

    /* Touch controls - hidden on desktop, shown on touch devices */
    #touch-controls {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 8px 16px;
      justify-content: space-between;
      align-items: center;
    }

    /* D-pad */
    .dpad {
      display: grid;
      grid-template-columns: 48px 48px 48px;
      grid-template-rows: 48px 48px 48px;
      gap: 2px;
    }
    .dpad-btn {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.7);
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }
    .dpad-blank { visibility: hidden; }

    /* Action buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
      color: #fff;
    }
    .action-btn:active, .action-btn.pressed {
      transform: scale(0.92);
    }
    .btn-a {
      background: rgba(233, 69, 96, 0.3);
      border-color: #e94560;
    }
    .btn-b {
      background: rgba(52, 152, 219, 0.3);
      border-color: #3498db;
    }

    /* Show touch controls on touch-capable devices */
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
      #game-container { justify-content: flex-start; padding-top: 8px; }
    }

    /* Also show if screen is narrow (likely mobile) */
    @media (max-width: 600px) {
      #touch-controls { display: flex; }
      #game-container { justify-content: flex-start; padding-top: 4px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="480" height="320"></canvas>
    <div id="touch-controls">
      <div class="dpad">
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowUp">&uarr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowLeft">&larr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowRight">&rarr;</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" data-key="ArrowDown">&darr;</div>
        <div class="dpad-blank"></div>
      </div>
      <div class="action-buttons">
        <div class="action-btn btn-a" data-key="Enter">A</div>
        <div class="action-btn btn-b" data-key="Escape">B</div>
      </div>
    </div>
  </div>
  <!-- Serve with: python3 -m http.server -->
  <script type="module" src="game.js"></script>
  <script type="module">
    import { simulatePress, simulateRelease } from './engine/input.js';

    document.querySelectorAll('[data-key]').forEach(btn => {
      const key = btn.dataset.key;

      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        simulatePress(key);
      }, { passive: false });

      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        simulateRelease(key);
      }, { passive: false });

      btn.addEventListener('touchcancel', (e) => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });

      // Mouse fallback for testing on desktop
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        simulatePress(key);
      });
      btn.addEventListener('mouseup', (e) => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });
      btn.addEventListener('mouseleave', () => {
        btn.classList.remove('pressed');
        simulateRelease(key);
      });
    });
  </script>
</body>
</html>
